<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>{{ page.title }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- MathJax v4 with semantic macros -->
    {% assign macros_json = page.mathjax_macros | default: "{}" %}
    <script>
        var _macros = {{ macros_json }};
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                macros: _macros
            }
        };
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/mathjax@4/tex-chtml.js"></script>

    <!-- Base exploration styling (et-book typography, sidenotes, collapsible sections) -->
    <link rel="stylesheet" href="/assets/explorations-base.css">

    <!-- Page-specific CSS -->
    {% for css in page.css %}
    <link rel="stylesheet" href="{{ css }}">
    {% endfor %}
</head>

<body>

    <div class="exploration-content">
        {{ content }}
    </div>

    <!-- Collapsible sections -->
    <script src="/assets/explorations-collapse.js"></script>

    <!-- Page-specific JS -->
    {% for js in page.js %}
    <script src="{{ js }}"></script>
    {% endfor %}

</body>

</html>
