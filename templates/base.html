<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>$if(title)$$title$ — $site-title$$else$$site-title$$endif$</title>

  <!-- MathJax v4: Pandoc emits \(...\) and \[...\] inside <span class="math"> -->
  <script>
  MathJax = {
    tex: {
      inlineMath: [['\\(', '\\)'], ['$$', '$$']],
      displayMath: [['\\[', '\\]'], ['$$$$', '$$$$']]
$if(mathjax-macros-json)$
      , macros: $mathjax-macros-json$
$endif$
    }
  };
  </script>
  <script id="MathJax-script" async
    src="https://cdn.jsdelivr.net/npm/mathjax@4/tex-chtml.js"></script>

  <link rel="stylesheet" href="/assets/css/base.css">
  <link rel="stylesheet" href="/assets/css/post.css">
  <link rel="stylesheet" href="/assets/css/site.css">
$for(css)$
  <link rel="stylesheet" href="/assets/css/$css$">
$endfor$
</head>
<body class="page-style-$if(page-style)$$page-style$$else$post$endif$">

  <header class="site-header">
    <div class="wrapper">
      <a class="site-title" href="/">$site-title$</a>
      <nav class="site-nav">
        <input type="checkbox" id="nav-trigger" class="nav-trigger"/>
        <label for="nav-trigger" class="menu-icon">
          <svg viewBox="0 0 18 15" width="18" height="15">
            <path d="M18,1.484c0,0.82-0.665,1.484-1.484,1.484H1.484C0.665,2.969,0,2.304,0,1.484l0,0C0,0.665,0.665,0,1.484,0 h15.032C17.335,0,18,0.665,18,1.484L18,1.484z M18,7.516C18,8.335,17.335,9,16.516,9H1.484C0.665,9,0,8.335,0,7.516l0,0 c0-0.82,0.665-1.484,1.484-1.484h15.032C17.335,6.031,18,6.696,18,7.516L18,7.516z M18,13.516C18,14.335,17.335,15,16.516,15H1.484 C0.665,15,0,14.335,0,13.516l0,0c0-0.82,0.665-1.484,1.484-1.484h15.032C17.335,12.031,18,12.696,18,13.516L18,13.516z"/>
          </svg>
        </label>
        <div class="trigger">
$for(nav)$
          <a class="page-link" href="$nav.url$"$if(nav.external)$ target="_blank"$endif$>$nav.text$</a>
$endfor$
        </div>
      </nav>
    </div>
  </header>

  <main class="page-content$if(no-sidenotes)$ no-sidenotes$endif$">
    <div class="wrapper">
      <article>
$if(title)$
        <header class="post-header">
          <h1 class="post-title">$title$</h1>
$if(date)$
          <p class="post-meta">
            <time>$date$</time>
$if(author)$
            · $author$
$endif$
$if(tags)$
            · <span class="post-tags">$for(tags)$$tags$$sep$, $endfor$</span>
$endif$
          </p>
$endif$
        </header>
$endif$

        <div class="post-content">
$body$
        </div>
      </article>
    </div>
  </main>

  <footer class="site-footer">
    <div class="wrapper">
$if(last-modified)$
      <span class="last-modified">Last modified: $last-modified$</span>
$endif$
    </div>
  </footer>

  <script src="/assets/js/collapse.js"></script>
  <script src="/assets/js/active-nav.js"></script>
$for(js)$
  <script src="/assets/js/$js$.bundle.js"></script>
$endfor$
</body>
</html>
