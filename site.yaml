# pandoc-crossref config: @sec:foo, @fig:foo, @tbl:foo, @eq:foo refs
# resolve to clickable links. Default to § for sections (e.g. "see
# @sec:foo" → "see §5"); individual posts can override these keys in
# their own front matter if a different prefix fits the prose better.
linkReferences: true
nameInLink: true
secPrefix: ["§", "§§"]
figPrefix: ["Figure",  "Figures"]
tblPrefix: ["Table",   "Tables"]
eqnPrefix: ["Eq.",     "Eqs."]
